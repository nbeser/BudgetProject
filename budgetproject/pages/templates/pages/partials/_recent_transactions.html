{% load static %}

<h1 class="text-center text-muted p-3">Son İşlemler</h1>

{% for i in son_islemler %}
<div class="card mt-2 {% if i.category.type != "income" %} border-warning text-warning {% else %} border-success text-success {% endif %}">
  <div class="card-header">
    İşlem yapılan hesap: <b> {{ i.account }} </b></h5>
  </div>
  <div class="card-body">
    <h5 class="card-title">{{ i.amount }} {{ i.currency }} | {% if i.category.type == "expense" %} Gider {% else %} Gelir {% endif %}
    <p class="card-text">{{ i.description }}</p>
  </div>
</div>
{% endfor %}
